name: CDK CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cdk-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  SCHEDULE_HOUR_UTC: ${{ vars.SCHEDULE_HOUR_UTC || '17' }}
  WIND_THRESHOLD_KPH: ${{ vars.WIND_THRESHOLD_KPH || '10' }}
  GUST_THRESHOLD_KPH: ${{ vars.GUST_THRESHOLD_KPH || '20' }}
  LATITUDE: ${{ secrets.LATITUDE || vars.LATITUDE || '48.8566' }}
  LONGITUDE: ${{ secrets.LONGITUDE || vars.LONGITUDE || '2.3522' }}
  LOCATION_LABEL: ${{ secrets.LOCATION_LABEL || vars.LOCATION_LABEL || 'Paris, France' }}

jobs:
  ci:
    name: Build and Synth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build TypeScript
        run: yarn build

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      - name: CDK Synth
        run: yarn cdk synth -c scheduleHourUtc=${{ env.SCHEDULE_HOUR_UTC }} -c windThresholdKph=${{ env.WIND_THRESHOLD_KPH }} -c gustThresholdKph=${{ env.GUST_THRESHOLD_KPH }} -c latitude="${{ env.LATITUDE }}" -c longitude="${{ env.LONGITUDE }}" -c locationLabel="${{ env.LOCATION_LABEL }}"

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Deploy
        run: yarn cdk deploy --require-approval never -c scheduleHourUtc=${{ env.SCHEDULE_HOUR_UTC }} -c windThresholdKph=${{ env.WIND_THRESHOLD_KPH }} -c gustThresholdKph=${{ env.GUST_THRESHOLD_KPH }} -c latitude="${{ env.LATITUDE }}" -c longitude="${{ env.LONGITUDE }}" -c locationLabel="${{ env.LOCATION_LABEL }}"
